<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Tech Haven</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-page">
    <!-- Left Panel -->
    <div class="auth-panel-left d-none d-lg-flex">
      <div class="text-center">
        <div class="auth-brand">TECH HAVEN</div>
        <h2 class="auth-title">Welcome back.</h2>
        <p class="auth-subtitle">Sign in to access your orders, wishlist, and saved builds.</p>
      </div>
    </div>
    
    <!-- Right Panel -->
    <div class="auth-panel-right">
      <div class="auth-form">
        <!-- Mobile brand -->
        <div class="d-lg-none text-center mb-4">
          <div class="auth-brand">TECH HAVEN</div>
        </div>
        
        <h3 class="auth-form-title">Sign In</h3>
        
        <form onsubmit="event.preventDefault(); showToast('Sign in functionality coming soon!');">
          <input type="email" class="auth-input" placeholder="Email address" required>
          <input type="password" class="auth-input" placeholder="Password" required>
          
          <a href="#" class="auth-link text-decoration-none">Forgot password?</a>
          
          <button type="submit" class="btn-auth">Sign In</button>
        </form>
        
        <div class="auth-divider">
          <span>or</span>
        </div>
        
        <p class="auth-footer">
          Don't have an account? <a href="signup.html" class="text-decoration-none">Sign Up</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
