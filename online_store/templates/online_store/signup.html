<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Tech Haven</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-page">
    <!-- Left Panel -->
    <div class="auth-panel-left d-none d-lg-flex">
      <div class="text-center">
        <div class="auth-brand">TECH HAVEN</div>
        <h2 class="auth-title">Join the community.</h2>
        <p class="auth-subtitle">Create an account to unlock exclusive deals, track orders, and save your favorite builds.</p>
      </div>
    </div>
    
    <!-- Right Panel -->
    <div class="auth-panel-right">
      <div class="auth-form">
        <!-- Mobile brand -->
        <div class="d-lg-none text-center mb-4">
          <div class="auth-brand">TECH HAVEN</div>
        </div>
        
        <h3 class="auth-form-title">Create Account</h3>
        
        <form onsubmit="event.preventDefault(); showToast('Account creation coming soon!');">
          <input type="text" class="auth-input" placeholder="Full name" required>
          <input type="email" class="auth-input" placeholder="Email address" required>
          <input type="password" class="auth-input" placeholder="Password" required>
          <input type="password" class="auth-input" placeholder="Confirm password" required>
          
          <p class="auth-disclaimer">
            By creating an account, you agree to our <a href="#" style="color: var(--accent-warm);">Terms of Service</a> and <a href="#" style="color: var(--accent-warm);">Privacy Policy</a>.
          </p>
          
          <button type="submit" class="btn-auth">Create Account</button>
        </form>
        
        <div class="auth-divider">
          <span>or</span>
        </div>
        
        <p class="auth-footer">
          Already have an account? <a href="login.html" class="text-decoration-none">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
